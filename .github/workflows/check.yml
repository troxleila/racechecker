name: NYRR check

on:
  schedule:
    - cron: "5,35 * * * *"      # ~every 30 min (UTC). Off-the-hour to dodge peak lag.
  workflow_dispatch: {}          # manual "Run workflow" button for testing

permissions:
  contents: write                # needed to commit updated state

concurrency:
  group: nyrr-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run watcher
        run: python -m watcher.main
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      - name: Commit state if changed
        run: |
          git config user.name "nyrr-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Update watcher state [skip ci]"
            git push
          fi
