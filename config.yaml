# ─────────────────────────────────────────────────────────────────────────────
# NYRR Race Spot Watcher — configuration
# No secrets in here. Gmail credentials come from environment / GitHub Secrets.
# ─────────────────────────────────────────────────────────────────────────────

# ── DISCOVERY ────────────────────────────────────────────────────────────────
# The bot tries these paths in order:
#   1. Haku widget API (auto — no config needed; finds all 9+1 events)
#   2. Seed events     (manual fallback — paste events.nyrr.org URLs below)
#   3. Listing scrape  (auto fallback — scrapes the NYRR listing pages)
#
# If Haku works (it should), paths 2 and 3 are never used.

selection:
  require_tags: ["9+1 Credit"]
  include_registration: true
  include_volunteer: true
  only_names: []               # e.g. ["Queens 10K"] -> only titles containing this
  exclude_names: []            # e.g. ["Marathon"]   -> skip titles containing this

# ── SEED EVENTS (fallback if Haku API is blocked) ────────────────────────────
# Paste events.nyrr.org URLs here. Only used if Haku discovery returns nothing.
seed_events:
  - url: "https://events.nyrr.org/nyrr-jersey-city-5k"
    kind: registration
  - url: "https://events.nyrr.org/nyrr-team-champs"
    kind: registration
  - url: "https://events.nyrr.org/nyrr-retro-4-miler-volunteers"
    kind: volunteer

# ── LISTING PAGES (fallback — currently JS-rendered, unlikely to work) ───────
listings:
  registration: "https://www.nyrr.org/run/race-calendar"
  volunteer: "https://www.nyrr.org/getinvolved/volunteeropportunities"

# Cache discovery results so we don't re-hit the API every 30 min.
discovery_refresh_hours: 12

# ── Notification ─────────────────────────────────────────────────────────────
recipient_email: "leilatroxell@gmail.com"

# ── Politeness ───────────────────────────────────────────────────────────────
user_agent: "nyrr-watcher/1.0 (personal race-spot monitor)"
request_delay_seconds: 1.0

quiet_hours: null
